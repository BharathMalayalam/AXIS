name: CD - Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd AXIS || git clone https://github.com/${{ github.repository }} AXIS
            cd AXIS
            git pull origin main
            
            # Setup Environment variables if needed (or assume they exist on server)
            # You can also use secrets to create .env files here
            
            # Restart containers
            sudo docker compose down
            sudo docker compose up --build -d
            
            # Optional: Cleanup unused images
            sudo docker image prune -f
